---
# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/refs/heads/master/src/schemas/json/github-workflow.json
name: Workflow - Pull Request Main

# This workflow orchestrates all checks and tests for pull requests
# It uses reusable workflows to keep the configuration DRY
on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

# Use concurrency to prevent multiple workflows running on the same PR
concurrency:
  group: pr-checks-${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  # ========================================================================= #
  #                                 DATABASE                                  #
  # ========================================================================= #

  # Update database version for schema changes
  update-version-db:
    if: github.event.pull_request.draft == false
    uses: ./.github/workflows/task-ci-version-file.yml
    with:
      label: db-migration
      version-file: .db-versions.yml
    secrets: inherit

  # ========================================================================= #
  #                                 ARTIFACTS                                 #
  # ========================================================================= #

  # Update artifact version for source changes
  update-version-artifacts:
    if: github.event.pull_request.draft == false
    uses: ./.github/workflows/task-ci-version-file.yml
    with:
      label: artifacts-update
      version-file: .artifact-versions.yml
    secrets: inherit

  build-artifacts:
    needs: update-version-artifacts
    uses: ./.github/workflows/task-build-artifacts.yml
    with:
      should_run: ${{ needs.update-version-artifacts.outputs.update }}
    permissions:
      contents: read
      attestations: write
      id-token: write
    secrets: inherit

  publish-artifacts:
    needs: [update-version-artifacts, build-artifacts]
    uses: ./.github/workflows/task-publish-image.yml
    with:
      image-name: artifacts
      tag: ${{ needs.build-artifacts.outputs.artifacts }}
      tag-version: ${{ needs.build-artifacts.outputs.artifacts-pr }}
      should_run: ${{ needs.update-version-artifacts.outputs.update }}
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    secrets: inherit

  # ========================================================================= #
  #                                   MADARA                                  #
  # ========================================================================= #

  # Build Madara binary (START IMMEDIATELY - foundational job for everything)
  build-madara:
    needs: [update-version-db, publish-artifacts] # Start as early as possible
    uses: ./.github/workflows/task-build-madara.yml
    secrets: inherit

  # ========================================================================= #
  #                                   LINTS                                   #
  # ========================================================================= #

  # Run linters for code style and quality (non-Rust, can run in parallel with build)
  lint-code-style:
    needs: [update-version-db, publish-artifacts]
    uses: ./.github/workflows/task-lint-code-style.yml

  # Run Rust-specific linters (reuse build-madara's compilation cache)
  lint-rust:
    needs: [build-madara] # ⚡ Reuse compilation cache from build-madara
    uses: ./.github/workflows/task-lint-cargo.yml
    secrets: inherit

  # Run coverage tests (reuse build-madara's compilation cache + binary)
  test-madara:
    needs: [build-madara] # ⚡ Reuse cache + need binary
    uses: ./.github/workflows/task-test-madara.yml
    with:
      madara-binary-hash: ${{ needs.build-madara.outputs.madara-binary-hash }}
    secrets: inherit

  # Run JavaScript tests (need binary, non-Rust so can run after lint-code-style too)
  test-js:
    needs: [build-madara, lint-code-style] # Need binary + can wait for linting
    uses: ./.github/workflows/task-test-js.yml
    with:
      madara-binary-hash: ${{ needs.build-madara.outputs.madara-binary-hash }}
      cairo-artifacts-hash: ${{ needs.build-madara.outputs.cairo-artifacts-hash }}

  # Run CLI tests (reuse build-madara's compilation cache)
  test-cli:
    needs: [build-madara] # ⚡ Reuse cache + need binary
    uses: ./.github/workflows/task-test-cli.yml
    secrets: inherit

  # ========================================================================= #
  #                                ORCHESTRATOR                               #
  # ========================================================================= #

  # Check Orchestrator binary (reuse build-madara's compilation cache)
  check-orchestrator:
    needs: [build-madara] # ⚡ Reuse compilation cache from build-madara
    uses: ./.github/workflows/task-check-orchestrator.yml
    secrets: inherit

  # Run coverage tests (need binary + orchestrator check)
  test-orchestrator:
    needs: [build-madara, check-orchestrator] # Need binary + orchestrator validation
    uses: ./.github/workflows/task-test-orchestrator.yml
    with:
      madara-binary-hash: ${{ needs.build-madara.outputs.madara-binary-hash }}
    secrets: inherit

  # Run e2e tests (need binary + orchestrator check)
  e2e-orchestrator:
    needs: [build-madara, check-orchestrator] # Need binary + orchestrator validation
    uses: ./.github/workflows/task-e2e-orchestrator.yml
    with:
      madara-binary-hash: ${{ needs.build-madara.outputs.madara-binary-hash }}
    secrets: inherit

  # ========================================================================= #
  #                                BOOTSTRAPPER                               #
  # ========================================================================= #

  # Check Bootstrapper binary (reuse build-madara's compilation cache)
  check-bootstrapper:
    needs: [build-madara] # ⚡ Reuse compilation cache from build-madara
    uses: ./.github/workflows/task-check-bootstrapper.yml
    secrets: inherit

  # Run coverage tests (need binary + bootstrapper check)
  test-bootstrapper:
    needs: [build-madara, check-bootstrapper] # Need binary + bootstrapper validation
    uses: ./.github/workflows/task-test-bootstrapper.yml
    with:
      madara-binary-hash: ${{ needs.build-madara.outputs.madara-binary-hash }}
    secrets: inherit

  # ========================================================================= #
  #                                MERGE QUEUE                                #
  # ========================================================================= #

  build-nightly:
    uses: ./.github/workflows/task-do-nothing-build-nightly.yml

  # test-hive:
  #   uses: ./.github/workflows/task-do-nothing-test-hive.yml

  publish-nightly:
    uses: ./.github/workflows/task-do-nothing-publish-image.yml
