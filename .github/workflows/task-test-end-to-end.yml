---
# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/refs/heads/master/src/schemas/json/github-workflow.json
name: Task - Test E2E

# This workflow runs end-to-end tests for the Madara System
# It builds all required binaries and runs the e2e test suite
on:
  workflow_dispatch:
  workflow_call:
    secrets:
      ETHEREUM_SEPOLIA_RPC:
        required: false
      MADARA_ORCHESTRATOR_ATLANTIC_API_KEY:
        required: true

jobs:
  test-end-to-end:
    runs-on: blacksmith-8vcpu-ubuntu-2404

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Load env
        uses: ./.github/actions/load-env

      - name: Foundry setup
        uses: ./.github/actions/setup-foundry
        with:
          foundry-version: ${{ env.BUILD_FOUNDRY_VERSION }}

      - name: Pull Docker images
        run: |
          docker pull localstack/localstack@sha256:763947722c6c8d33d5fbf7e8d52b4bddec5be35274a0998fdc6176d733375314
          docker pull mongo:latest

      - name: Rust setup
        uses: ./.github/actions/setup-rust
        with:
          rust-version: ${{ env.BUILD_RUST_VERSION }}
          extra-cache: false

      - name: Setup Python Cairo (needed for orchestrator build)
        uses: ./.github/actions/setup-python-cairo

      - name: Build Madara
        run: CARGO_TARGET_DIR=target cargo build --bin madara --release

      - name: Build Orchestrator
        run: CARGO_TARGET_DIR=target cargo build --bin orchestrator --release

      - name: Build Bootstrapper V2
        run: CARGO_TARGET_DIR=target cargo build --manifest-path bootstrapper-v2/Cargo.toml --bin bootstrapper-v2 --release

      - name: Download and extract Pathfinder binary
        run: |
          mkdir -p target/release/
          curl -L -o pathfinder.tar.gz https://github.com/karnotxyz/pathfinder/releases/download/v0.14.1-alpha.3/pathfinder-x86_64-unknown-linux-gnu.tar.gz
          tar -xf pathfinder.tar.gz -C target/release/
          rm pathfinder.tar.gz

      - name: Make binaries executable
        run: |
          chmod +x target/release/madara
          chmod +x target/release/bootstrapper-v2
          chmod +x target/release/pathfinder
          chmod +x target/release/orchestrator
          chmod +x test_utils/scripts/deploy_dummy_verifier.sh

      - name: Build E2E for tests
        run: cargo build -p e2e

      - name: Run E2E test
        env:
          AWS_REGION: us-east-1
          MADARA_ORCHESTRATOR_ETHEREUM_SETTLEMENT_RPC_URL: ${{ secrets.ETHEREUM_SEPOLIA_RPC }}
          MADARA_ORCHESTRATOR_ATLANTIC_API_KEY: ${{ secrets.MADARA_ORCHESTRATOR_ATLANTIC_API_KEY }}
        run: |
          RUST_LOG=info cargo test \
          --package e2e test_bridge_deposit_and_withdraw \
          -- --test-threads=10 --nocapture
