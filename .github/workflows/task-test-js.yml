---
# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/refs/heads/master/src/schemas/json/github-workflow.json
name: Task - Test JavaScript

# This workflow runs JavaScript compatibility tests for Starknet.js
# against the Madara binary to ensure API compatibility
on:
  workflow_dispatch:
  workflow_call:
    inputs:
      madara-binary-hash:
        description: "Hash used to retrieve the madara binary"
        required: true
        type: string
      cairo-artifacts-hash:
        description: "Hash used to retrieve the cairo artifacts"
        required: true
        type: string

jobs:
  test-js:
    runs-on: blacksmith-4vcpu-ubuntu-2204
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download Madara binary
        uses: actions/download-artifact@v4
        with:
          name: madara-binary-${{ inputs.madara-binary-hash }}
          path: target/release/

      - name: Make Madara binary executable
        run: chmod +x target/release/madara

      - name: Download Cairo artiracts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-${{ inputs.cairo-artifacts-hash }}
          path: build-artifacts/

      - name: Install Foundry (Anvil)
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install dependencies
        run: |
          if ! command -v nc 2>&1 >/dev/null; then
            sudo apt-get update
            sudo apt-get install -y netcat
          fi
          cd tests/js_tests
          npm install

      - name: Setup Anvil and deploy DummyContract
        run: |
          source scripts/setup-anvil.sh
          echo "ANVIL_PID=$ANVIL_PID" >> $GITHUB_ENV
          echo "ANVIL_PORT=$ANVIL_PORT" >> $GITHUB_ENV
          echo "CORE_CONTRACT=$CORE_CONTRACT" >> $GITHUB_ENV

      - name: Setup Madara with L1 sync and run tests
        run: |
          ./target/release/madara \
            --name madara \
            --base-path ../madara_db \
            --rpc-port 9944 \
            --rpc-cors "*" \
            --rpc-external \
            --rpc-admin \
            --devnet \
            --preset devnet \
            --l1-gas-price 0 \
            --blob-gas-price 0 \
            --strk-per-eth 1 \
            --l1-endpoint "http://127.0.0.1:${{ env.ANVIL_PORT }}" \
            --chain-config-override "block_time=1h,eth_core_contract_address=${{ env.CORE_CONTRACT }}" &

          MADARA_PID=$!

          while ! echo exit | nc localhost 9944; do sleep 1; done
          cd tests/js_tests
          ANVIL_PORT=${{ env.ANVIL_PORT }} CORE_CONTRACT=${{ env.CORE_CONTRACT }} npm test

          kill $MADARA_PID
          kill ${{ env.ANVIL_PID }} 2>/dev/null || true
